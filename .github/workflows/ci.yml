name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (compiler)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install C toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test --workspace
        run: cargo test --workspace

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build aura CLI
        run: cargo build -p aura-cli

      - name: Check corpus (excl. diag)
        env:
          AURA_BIN: target/debug/aura
        run: bash scripts/check-corpus.sh

      - name: Smoke run / test
        run: |
          set -euo pipefail
          bin=target/debug/aura
          "$bin" version
          "$bin" run corpus/hello/main.aura
          "$bin" test corpus/test/smoke.aura
          "$bin" run corpus/multi
          "$bin" test corpus/multi
          "$bin" run corpus/import/app
          "$bin" run corpus/std_io/app
          "$bin" run corpus/std_io/files
          "$bin" run corpus/std_assert/app
          "$bin" run corpus/expr/string_substring.aura
          "$bin" test examples/notes
          "$bin" run examples/notes

      - name: Embedded runtime (no monorepo path)
        run: |
          set -euo pipefail
          # Force cache materialize: hide in-tree runtime via bogus AURA_RUNTIME unset
          # and run from a temp dir so relative runtime/ is missing.
          TMP="$(mktemp -d)"
          cp target/debug/aura "$TMP/aura"
          mkdir -p "$TMP/hello/src"
          cat >"$TMP/hello/aura.toml" <<'EOF'
          [package]
          name = "hello"
          [[bin]]
          name = "hello"
          path = "src"
          EOF
          cat >"$TMP/hello/src/main.aura" <<'EOF'
          package hello
          fun main() { println("embedded-rt-ok") }
          EOF
          # Clear HOME cache namespace for this job and run without repo cwd
          export HOME="$TMP/home"
          mkdir -p "$HOME"
          unset AURA_RUNTIME || true
          (cd "$TMP" && ./aura run hello)

  sanitizer:
    name: Sanitizer smoke (C runtime/codegen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install C toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Build aura CLI
        run: cargo build -p aura-cli

      - name: AddressSanitizer and UBSan smoke
        env:
          AURA_BIN: target/debug/aura
        run: bash scripts/sanitizer-smoke.sh

  site:
    name: Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from package.json "packageManager" (pnpm@9.15.9)

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm site:test

      - name: Build
        env:
          # Match production (Cloudflare custom domain at site root).
          VITE_BASE: /
        run: pnpm site:build
