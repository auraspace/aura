name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    # strategy:
    #   matrix:
    #     test_mode: [interp, compiler]

    # strategy:
    #   matrix:
    #     test_mode: [interp, compiler]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: format
        run: cargo fmt --all -- --check

      - name: lint
        run: cargo clippy -- -A warnings

      - name: test
        env:
          AURA_TEST_MODE: ${{ matrix.test_mode }}
        run: cargo test
