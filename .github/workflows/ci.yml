name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (compiler)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install C toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test --workspace
        run: cargo test --workspace

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build aura CLI
        run: cargo build -p aura-cli

      - name: Check corpus (excl. diag)
        env:
          AURA_BIN: target/debug/aura
        run: bash scripts/check-corpus.sh

      - name: Smoke run / test
        env:
          AURA_BIN: target/debug/aura
        run: |
          bash scripts/compiler-regression.sh

      - name: Embedded runtime (no monorepo path)
        run: |
          set -euo pipefail
          # Force cache materialize: hide in-tree runtime via bogus AURA_RUNTIME unset
          # and run from a temp dir so relative runtime/ is missing.
          TMP="$(mktemp -d)"
          cp target/debug/aura "$TMP/aura"
          mkdir -p "$TMP/hello/src"
          cat >"$TMP/hello/aura.toml" <<'EOF'
          [package]
          name = "hello"
          [[bin]]
          name = "hello"
          path = "src"
          EOF
          cat >"$TMP/hello/src/main.aura" <<'EOF'
          package hello
          fun main() { println("embedded-rt-ok") }
          EOF
          # Clear HOME cache namespace for this job and run without repo cwd
          export HOME="$TMP/home"
          mkdir -p "$HOME"
          unset AURA_RUNTIME || true
          (cd "$TMP" && ./aura run hello)

  sanitizer:
    name: Sanitizer smoke (C runtime/codegen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install C toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Build aura CLI
        run: cargo build -p aura-cli

      - name: AddressSanitizer and UBSan smoke
        env:
          AURA_BIN: target/debug/aura
        run: bash scripts/sanitizer-smoke.sh

  platform-contract:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
            rust_target: x86_64-unknown-linux-gnu
          - os: macos-14
            name: darwin-arm64
            rust_target: aarch64-apple-darwin
          - os: macos-14
            name: darwin-amd64
            rust_target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install C toolchain (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: platform-${{ matrix.name }}

      - name: Package and verify supported target
        env:
          TAG_VERSION: 0.0.0-ci
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail
          bash -n scripts/package-release.sh scripts/install.sh scripts/avm
          bash scripts/package-release.sh
          archive="dist/aura-${TAG_VERSION}-${{ matrix.name }}.tar.gz"
          checksum="${archive}.sha256"
          test -f "$archive"
          test -f "$checksum"
          case "${{ runner.os }}" in
            Linux) sha256sum --check "$checksum" ;;
            macOS) shasum -a 256 --check "$checksum" ;;
            *) echo "error: unsupported CI runner: ${{ runner.os }}" >&2; exit 1 ;;
          esac

  site:
    name: Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from package.json "packageManager" (pnpm@9.15.9)

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm site:test

      - name: Build
        env:
          # Match production (Cloudflare custom domain at site root).
          VITE_BASE: /
        run: pnpm site:build
