name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt / clippy / test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - target: x86_64-unknown-linux-gnu
          #   os: ubuntu-latest
          #   llvm_prefix: /usr/lib/llvm-15
          #   install_llvm: |
          #     sudo apt-get update
          #     sudo apt-get install -y llvm-15 clang-15 libclang-15-dev libpolly-15-dev
          #     echo "/usr/lib/llvm-15/bin" >> "$GITHUB_PATH"

          - target: aarch64-apple-darwin
            os: macos-14
            llvm_prefix: /opt/homebrew/opt/llvm@15
            install_llvm: |
              brew update
              brew install llvm@15
              echo "/opt/homebrew/opt/llvm@15/bin" >> "$GITHUB_PATH"

    env:
      LLVM_SYS_150_PREFIX: ${{ matrix.llvm_prefix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install LLVM 15
        run: ${{ matrix.install_llvm }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -A warnings

      - name: Test
        run: cargo test --workspace --locked

  build:
    name: build aurac (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - target: x86_64-unknown-linux-gnu
          #   os: ubuntu-latest
          #   llvm_prefix: /usr/lib/llvm-15
          #   install_llvm: |
          #     sudo apt-get update
          #     sudo apt-get install -y llvm-15 clang-15 libclang-15-dev libpolly-15-dev
          #     echo "/usr/lib/llvm-15/bin" >> "$GITHUB_PATH"

          - target: aarch64-apple-darwin
            os: macos-14
            llvm_prefix: /opt/homebrew/opt/llvm@15
            install_llvm: |
              brew update
              brew install llvm@15
              echo "/opt/homebrew/opt/llvm@15/bin" >> "$GITHUB_PATH"

    env:
      LLVM_SYS_150_PREFIX: ${{ matrix.llvm_prefix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 15
        run: ${{ matrix.install_llvm }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build aurac
        run: cargo build -p aurac --locked
