# Build toolchain tarballs and publish a GitHub Release when a version tag is pushed.
# Tag format: v0.1.0-alpha, v0.1.0, v1.2.3-rc.1, …
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
          - os: macos-14
            name: darwin-arm64
          # macos-13 (Intel) retired Dec 2025; cross-compile amd64 on Apple Silicon.
          - os: macos-14
            name: darwin-amd64
            rust_target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install C toolchain (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.name }}

      - name: Package release tarball
        env:
          # scripts/package-release.sh: strip leading v from the tag
          TAG_VERSION: ${{ github.ref_name }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: bash scripts/package-release.sh

      # Native artifacts only: a cross-built x86_64 binary cannot run on arm64 runners.
      - name: Smoke the packaged binary
        if: ${{ !matrix.rust_target }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/aura-*.tar.gz)
          if [[ ${#tarballs[@]} -ne 1 ]]; then
            echo "error: expected exactly one dist/aura-*.tar.gz, found ${#tarballs[@]}" >&2
            ls -la dist || true
            exit 1
          fi
          tar="${tarballs[0]}"
          # Drain the full listing so GNU tar does not hit SIGPIPE under pipefail
          # (tar | head -1 fails on Linux with "tar: stdout: write error").
          stage="$(
            tar -tzf "$tar" | {
              IFS= read -r first
              printf '%s\n' "${first%%/*}"
              cat >/dev/null
            }
          )"
          if [[ -z "$stage" ]]; then
            echo "error: could not determine stage directory from $tar" >&2
            exit 1
          fi
          tar -xzf "$tar" -C dist
          export PATH="$PWD/dist/$stage/bin:$PATH"
          aura version
          TMP="$(mktemp -d)"
          aura new "$TMP/hello"
          aura run "$TMP/hello"

      - name: Verify cross-built binary (file type)
        if: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/aura-*.tar.gz)
          if [[ ${#tarballs[@]} -ne 1 ]]; then
            echo "error: expected exactly one dist/aura-*.tar.gz, found ${#tarballs[@]}" >&2
            exit 1
          fi
          tar="${tarballs[0]}"
          stage="$(
            tar -tzf "$tar" | {
              IFS= read -r first
              printf '%s\n' "${first%%/*}"
              cat >/dev/null
            }
          )"
          tar -xzf "$tar" -C dist
          bin="dist/$stage/bin/aura"
          file "$bin"
          # Expect Mach-O x86_64 (not arm64)
          file "$bin" | grep -qiE 'x86_64|Intel 64'
          lipo -info "$bin" 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aura-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all tarballs
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect assets
        id: assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # Artifacts may be nested per-job or flat depending on merge-multiple
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp -v {} release-assets/ \;
          ls -la release-assets
          count="$(find release-assets -type f | wc -l | tr -d ' ')"
          if [[ "$count" -lt 1 ]]; then
            echo "error: no release assets found" >&2
            exit 1
          fi

      - name: Generate aggregate SHA256 manifest
        run: |
          set -euo pipefail
          manifest="release-assets/SHA256SUMS"
          : >"$manifest"
          # SHA256SUMS and its detached signature are metadata about the
          # payload; excluding them avoids a self-referential manifest. The
          # published minisign.pub is trust configuration, not a payload.
          (
            cd release-assets
            find . -maxdepth 1 -type f \
              ! -name 'SHA256SUMS' \
              ! -name 'SHA256SUMS.minisig' \
              ! -name 'minisign.pub' \
              -print \
              | sed 's#^\./##' \
              | LC_ALL=C sort \
              | while IFS= read -r asset; do
                  sha256sum "$asset"
                done
          ) >"$manifest"
          [[ -s "$manifest" ]] || { echo "error: aggregate manifest is empty" >&2; exit 1; }
          echo "generated $manifest covering $(wc -l <"$manifest" | tr -d ' ') assets"

      - name: Sign aggregate manifest (optional, minisign)
        env:
          AURA_MINISIGN_SECRET_KEY: ${{ secrets.AURA_MINISIGN_SECRET_KEY }}
          AURA_MINISIGN_PUBLIC_KEY: ${{ vars.AURA_MINISIGN_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          # The private key is supplied only through GitHub Actions Secrets and
          # is never checked into or written to the repository checkout.
          if [[ -z "${AURA_MINISIGN_SECRET_KEY:-}" ]]; then
            echo "minisign signing disabled: configure secret AURA_MINISIGN_SECRET_KEY"
            exit 0
          fi
          [[ -n "${AURA_MINISIGN_PUBLIC_KEY:-}" ]] || {
            echo "error: AURA_MINISIGN_PUBLIC_KEY repository variable is required when signing is enabled" >&2
            exit 1
          }
          command -v minisign >/dev/null 2>&1 || {
            sudo apt-get update
            sudo apt-get install -y minisign
          }
          key_file="$(mktemp)"
          pub_file="$(mktemp)"
          trap 'rm -f "$key_file" "$pub_file"' EXIT
          umask 077
          printf '%s\n' "$AURA_MINISIGN_SECRET_KEY" >"$key_file"
          printf '%s\n' "$AURA_MINISIGN_PUBLIC_KEY" >"$pub_file"
          minisign -Sm release-assets/SHA256SUMS -s "$key_file"
          minisign -Vm release-assets/SHA256SUMS -p "$pub_file" >/dev/null
          cp "$pub_file" release-assets/minisign.pub
          echo "signed release-assets/SHA256SUMS"

      - name: Release notes body
        id: notes
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          BODY_FILE=release-body.md
          {
            echo "## Aura ${TAG}"
            echo
            if [[ -f "docs/releases/${VER}.md" ]]; then
              echo "Release notes: see \`docs/releases/${VER}.md\` in the tag."
              echo
            fi
            if [[ -f CHANGELOG.md ]]; then
              echo "### Changelog"
              echo
              # First section after the title (best-effort)
              awk 'BEGIN{p=0} /^## /{if(p){exit} p=1; next} p{print}' CHANGELOG.md | head -80
              echo
            fi
            echo "### Install (tarball)"
            echo
            echo '```bash'
            echo "tar xzf aura-*-<os>-<arch>.tar.gz"
            echo 'export PATH="$PWD/aura-*/bin:$PATH"'
            echo "aura version"
            echo "aura new hello && aura run hello"
            echo '```'
            echo
            echo "### Install (from source at this tag)"
            echo
            echo '```bash'
            echo "git clone --branch ${TAG} https://github.com/${GITHUB_REPOSITORY}.git aura"
            echo "cd aura && cargo install --path crates/aura-cli"
            echo '```'
            echo
            echo "Requires a system C compiler (\`cc\`) to build Aura programs."
            echo "Docs: https://aura.fadosoft.com"
          } >"$BODY_FILE"
          echo "path=$BODY_FILE" >>"$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PRE=()
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            PRE+=(--prerelease)
          fi
          # Idempotent-ish: if release exists, upload assets; else create
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
            gh release edit "$TAG" --notes-file "${{ steps.notes.outputs.path }}" "${PRE[@]+"${PRE[@]}"}"
          else
            gh release create "$TAG" \
              --title "Aura ${TAG}" \
              --notes-file "${{ steps.notes.outputs.path }}" \
              "${PRE[@]+"${PRE[@]}"}" \
              release-assets/*
          fi
