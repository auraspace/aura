name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release (aarch64-apple-darwin)
    runs-on: macos-14
    env:
      LLVM_SYS_150_PREFIX: /opt/homebrew/opt/llvm@15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install LLVM 15
        run: |
          brew update
          brew install llvm@15
          echo "/opt/homebrew/opt/llvm@15/bin" >> "$GITHUB_PATH"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build aurac (Release)
        run: cargo build -p aurac --release --locked

      - name: Package Binary
        shell: bash
        run: |
          cd target/release
          tar -czvf ../../aurac-aarch64-apple-darwin.tar.gz aurac
          cd ../..

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: aurac-aarch64-apple-darwin.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
