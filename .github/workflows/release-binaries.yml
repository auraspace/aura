name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release (aarch64-apple-darwin)
    runs-on: macos-14
    env:
      LLVM_SYS_150_PREFIX: /opt/homebrew/opt/llvm@15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install LLVM 15
        run: |
          brew update
          brew install llvm@15
          echo "/opt/homebrew/opt/llvm@15/bin" >> "$GITHUB_PATH"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build aurac (Release)
        run: cargo build -p aurac --release --locked

      - name: Package Binary
        shell: bash
        run: |
          cd target/release
          tar -czvf ../../aurac-aarch64-apple-darwin.tar.gz aurac
          cd ../..

      - name: Extract Changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          
          if [ -f "CHANGELOG.md" ]; then
            echo "Extracting changelog from CHANGELOG.md for version $VERSION"
            
            awk -v ver="$VERSION" '
              /^## \[/ {
                if (index($0, "[" ver "]") > 0) {
                  flag=1
                  next
                } else if (flag) {
                  exit
                }
              }
              flag && NF { print }
            ' CHANGELOG.md > release-notes.md
            
            # Check if we extracted anything
            if [ -s release-notes.md ]; then
              echo "Successfully extracted changelog section"
              head -20 release-notes.md
            else
              echo "No changelog section found for version $VERSION, using default"
              echo "Release v$VERSION" > release-notes.md
            fi
          else
            echo "No CHANGELOG.md found, using default"
            echo "Release v$VERSION" > release-notes.md
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          files: aurac-aarch64-apple-darwin.tar.gz
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
