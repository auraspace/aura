name: Deploy site (Cloudflare Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    environment:
      name: static-pages
      url: https://aura.fadosoft.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from package.json "packageManager" (pnpm@9.15.9)

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm site:test

      - name: Build
        env:
          # Custom domain serves at site root (not /repo/ GitHub Pages prefix).
          VITE_BASE: /
        run: pnpm site:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # First deploy creates the project if it does not exist.
          command: pages deploy site/dist --project-name=aura --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
